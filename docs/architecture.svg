
<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#888780"/>
    </marker>
  </defs>

  <!-- ── Telegram ── -->
  <rect x="20" y="160" width="140" height="68" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="90" y="186" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">Telegram</text>
  <text x="90" y="203" text-anchor="middle" font-size="10" fill="#185FA5">DMs · groups</text>
  <text x="90" y="218" text-anchor="middle" font-size="10" fill="#185FA5">channels</text>

  <!-- ── Fly.io wrapper ── -->
  <rect x="195" y="80" width="195" height="215" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="292" y="100" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">Fly.io  ~$4/mo</text>

  <!-- GramJS -->
  <rect x="208" y="108" width="169" height="82" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="292" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">GramJS listener</text>
  <text x="292" y="142" text-anchor="middle" font-size="10" fill="#5F5E5A">Node.js / TypeScript</text>
  <text x="292" y="157" text-anchor="middle" font-size="10" fill="#5F5E5A">NewMessage · getDifference()</text>
  <text x="292" y="172" text-anchor="middle" font-size="10" fill="#5F5E5A">outbox poll every 30 s</text>

  <!-- Backfill -->
  <rect x="208" y="202" width="169" height="60" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="292" y="220" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">Backfill scripts</text>
  <text x="292" y="236" text-anchor="middle" font-size="10" fill="#5F5E5A">getHistory() per dialog</text>
  <text x="292" y="251" text-anchor="middle" font-size="10" fill="#5F5E5A">POST /ingest in batches</text>

  <!-- ── Cloudflare Worker ── -->
  <rect x="430" y="80" width="175" height="215" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="517" y="100" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">Cloudflare Worker  $5/mo</text>
  <text x="517" y="118" text-anchor="middle" font-size="10" fill="#185FA5">POST  /ingest</text>
  <text x="517" y="133" text-anchor="middle" font-size="10" fill="#185FA5">GET   /search</text>
  <text x="517" y="148" text-anchor="middle" font-size="10" fill="#185FA5">GET   /chats · /contacts</text>
  <text x="517" y="163" text-anchor="middle" font-size="10" fill="#185FA5">POST  /outbox</text>
  <text x="517" y="178" text-anchor="middle" font-size="10" fill="#185FA5">POST  /actions</text>
  <text x="517" y="193" text-anchor="middle" font-size="10" fill="#185FA5">POST  /mcp</text>
  <line x1="448" y1="205" x2="597" y2="205" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="517" y="221" text-anchor="middle" font-size="10" fill="#0C447C">X-Ingest-Token auth</text>
  <text x="517" y="244" text-anchor="middle" font-size="10" fill="#185FA5">Workers Paid plan</text>

  <!-- ── Neon ── -->
  <rect x="655" y="80" width="148" height="110" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="1"/>
  <text x="729" y="100" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">Neon PostgreSQL</text>
  <text x="729" y="116" text-anchor="middle" font-size="10" fill="#3B6D11">messages · contacts</text>
  <text x="729" y="131" text-anchor="middle" font-size="10" fill="#3B6D11">outbox · config</text>
  <text x="729" y="146" text-anchor="middle" font-size="10" fill="#3B6D11">backfill_state</text>
  <text x="729" y="161" text-anchor="middle" font-size="10" fill="#3B6D11">pending_actions</text>
  <text x="729" y="179" text-anchor="middle" font-size="10" font-weight="500" fill="#27500A">$0 – 19 / mo</text>

  <!-- ── R2 ── -->
  <rect x="655" y="215" width="148" height="80" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="729" y="235" text-anchor="middle" font-size="11" font-weight="500" fill="#04342C">Cloudflare R2</text>
  <text x="729" y="251" text-anchor="middle" font-size="10" fill="#0F6E56">nightly NDJSON backup</text>
  <text x="729" y="266" text-anchor="middle" font-size="10" fill="#0F6E56">30-day TTL</text>
  <text x="729" y="281" text-anchor="middle" font-size="10" font-weight="500" fill="#04342C">~$0 / mo</text>

  <!-- ── AI Agent ── -->
  <rect x="430" y="390" width="175" height="68" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="517" y="412" text-anchor="middle" font-size="12" font-weight="500" fill="#26215C">AI Agent</text>
  <text x="517" y="428" text-anchor="middle" font-size="10" fill="#534AB7">Claude / MCP client</text>
  <text x="517" y="444" text-anchor="middle" font-size="10" fill="#534AB7">/mcp?token=…&amp;account_id=…</text>

  <!-- ── Arrows ── -->
  <!-- Telegram → GramJS -->
  <line x1="160" y1="183" x2="207" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="172" y="161" text-anchor="middle" font-size="10" fill="#5F5E5A">MTProto</text>

  <!-- GramJS → Worker -->
  <line x1="377" y1="152" x2="429" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="403" y="148" text-anchor="middle" font-size="10" fill="#5F5E5A">REST /ingest</text>

  <!-- Backfill → Worker -->
  <line x1="377" y1="232" x2="429" y2="220" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="403" y="244" text-anchor="middle" font-size="10" fill="#5F5E5A">REST /ingest</text>

  <!-- Worker → Neon -->
  <line x1="605" y1="148" x2="654" y2="140" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="630" y="136" text-anchor="middle" font-size="10" fill="#5F5E5A">SQL</text>

  <!-- Worker → R2 -->
  <line x1="605" y1="235" x2="654" y2="248" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="630" y="233" text-anchor="middle" font-size="10" fill="#5F5E5A">nightly</text>

  <!-- Agent → Worker -->
  <line x1="517" y1="389" x2="517" y2="296" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="532" y="346" font-size="10" fill="#5F5E5A">MCP</text>
</svg>
