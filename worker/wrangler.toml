name = "tg-reader"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "REPLACE_WITH_HYPERDRIVE_CONFIG_ID"
# Create with: wrangler hyperdrive create tg-reader-pg --connection-string="postgresql://..."

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "tg-reader-backup"

[triggers]
crons = ["0 3 * * *", "0 4 1 * *"]  # daily backup at 3am UTC, monthly storage check at 4am on 1st
